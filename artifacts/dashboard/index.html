    <style>
      /* Hide Replit feedback widget */
      #replco-feedback-widget,
      [data-testid="feedback-widget"],
      iframe[src*="replit.com/feedback"],
      iframe[src*="replit.com/survey"],
      div[class*="feedback"],
      div[id*="feedback"],
      div[class*="replco"],
      div[id*="replco"] { display: none !important; visibility: hidden !important; }
    </style>
    <script>
      // Remove Replit feedback popup as soon as it appears in the DOM
      const removeFeedback = () => {
        const selectors = [
          '#replco-feedback-widget',
          '[data-testid="feedback-widget"]',
          'iframe[src*="feedback"]',
          'iframe[src*="survey"]',
        ];
        selectors.forEach(sel => {
          document.querySelectorAll(sel).forEach(el => el.remove());
        });
        // Also remove any overlay with "Share your feedback" text
        document.querySelectorAll('div, section, aside').forEach(el => {
          if (el.innerText && el.innerText.includes('Share your feedback')) {
            el.style.display = 'none';
          }
        });
      };
      const observer = new MutationObserver(removeFeedback);
      document.addEventListener('DOMContentLoaded', () => {
        observer.observe(document.body, { childList: true, subtree: true });
        removeFeedback();
      });
    </script>

  <body>
    <div id="root"></div>

    <script>
      /* ── Auto clear stale cache on new deployment ── */
      (async function () {
        const DEPLOY_VERSION = 'v5';
        if (localStorage.getItem('cache-version') !== DEPLOY_VERSION) {
          localStorage.setItem('cache-version', DEPLOY_VERSION);
          try {
            if ('serviceWorker' in navigator) {
              const regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(r => r.unregister()));
            }
            const keys = await caches.keys();
            await Promise.all(keys.map(k => caches.delete(k)));
          } catch (e) {}
          location.reload(true);
        }
      })();
    </script>
